                        setTimeout(initIcons, 100);

                            onError={() => { setError(true); setLoading(false); }}

                                        </div>
                                        <div className="flex flex-col items-center gap-2">
                                            <div className="p-3 bg-lime-100 rounded-full text-lime-800"><Icon name="mountain" className="w-5 h-5" /></div>
                                            <span>NIVEL FÁCIL</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white p-2 rounded-3xl shadow-xl border border-stone-200 overflow-hidden relative group">
                                    <ImageWithFallback src={getImg(mapImgId)} alt="Mapa del Sendero El Limonar" className="w-full rounded-2xl" zoomable={true} />
                                    <div className="absolute top-6 left-6 bg-lime-800 text-white text-[8px] font-bold px-3 py-1 rounded-full uppercase tracking-widest shadow-lg">
                                        Pulsa para ampliar mapa
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'my-list' && (
                            <div className="max-w-3xl mx-auto space-y-8 pb-12">
                                <h2 className="text-2xl font-black text-lime-950 uppercase tracking-tighter">REPORTE DEL EXPLORADOR</h2>
                                {mySightings.length === 0 ? (
                                    <div className="bg-white p-12 rounded-[2.5rem] border border-stone-100 text-center flex flex-col items-center gap-4 shadow-sm">
                                        <div className="text-stone-200"><Icon name="camera" className="w-12 h-12" /></div>
                                        <p className="text-xs font-bold text-stone-300 uppercase tracking-widest">No has registrado hallazgos todavía.<br/>Presiona la cámara en las fotos de las especies.</p>
                                    </div>
                                ) : (
                                    <form onSubmit={handleSubmitAll} className="space-y-6">
                                        <div className="bg-white rounded-[2rem] border border-stone-100 divide-y shadow-sm overflow-hidden">
                                            {mySightings.map(s => (
                                                <div key={s.id} className="p-4 md:p-6 flex flex-col md:flex-row md:items-center gap-4">
                                                    <div className="flex items-center gap-4 flex-1">
                                                        <div className="w-14 h-14 rounded-2xl overflow-hidden shrink-0 shadow-sm">
                                                            <ImageWithFallback src={getImg(s.image)} alt={s.commonName} className="w-full h-full" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <p className="text-xs font-black uppercase text-stone-800 leading-tight">{s.commonName}</p>
                                                            <p className="text-[9px] text-stone-400 font-bold uppercase mt-1">{s.date} • {s.timestamp}</p>
                                                        </div>
                                                    </div>
                                                    <select 
                                                        required 
                                                        value={s.station}
                                                        onChange={(e) => updateSightingStation(s.id, e.target.value)}
                                                        className="md:w-56 bg-stone-50 text-[10px] p-3 rounded-xl border border-stone-100 outline-none font-bold text-stone-600 appearance-none"
                                                    >
                                                        <option value="" disabled>Estación de avistamiento</option>
                                                        {STATIONS.map(st => <option key={st} value={st}>{st}</option>)}
                                                    </select>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="bg-white p-8 rounded-[2rem] border border-stone-200 shadow-xl space-y-6">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <input required type="text" placeholder="Nombre completo" value={formData.nombre} onChange={(e) => setFormData({...formData, nombre: e.target.value})} className="w-full p-4 bg-stone-50 rounded-xl text-xs font-bold border border-stone-100 outline-none" />
                                                <input required type="email" placeholder="Correo electrónico" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} className="w-full p-4 bg-stone-50 rounded-xl text-xs font-bold border border-stone-100 outline-none" />
                                                <select required value={formData.cabana} onChange={(e) => setFormData({...formData, cabana: e.target.value})} className="w-full md:col-span-2 p-4 bg-stone-50 rounded-xl text-xs font-bold border border-stone-100 outline-none appearance-none">
                                                    <option value="" disabled>Selecciona tu Cabaña</option>
                                                    {CABINS.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                            <button disabled={status !== 'idle'} type="submit" className={`w-full py-5 text-white font-black uppercase tracking-[0.25em] text-[11px] rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all ${status === 'success' ? 'bg-green-600' : 'bg-lime-800'}`}>
                                                {status === 'sending' ? 'Sincronizando...' : (status === 'success' ? '¡Reporte Enviado!' : 'Enviar mi bitácora')}
                                                <Icon name={status === 'success' ? 'check' : 'send'} className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Modal Detalle */}
                    {selectedAnimal && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center bg-black/80 backdrop-blur-md p-4" onClick={() => setSelectedAnimal(null)}>
                            <div className="bg-white w-full max-w-lg rounded-t-[2.5rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl animate-fade-in" onClick={e => e.stopPropagation()}>
                                <div className="h-64 md:h-80 relative">
                                    <ImageWithFallback src={getImg(selectedAnimal.image)} alt={selectedAnimal.commonName} className="w-full h-full" />
                                    <button onClick={() => setSelectedAnimal(null)} className="absolute top-4 right-4 bg-black/40 p-3 rounded-full text-white backdrop-blur-md"><Icon name="x" className="w-5 h-5" /></button>
                                    <div className="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black via-black/40 to-transparent">
                                        <h2 className="text-2xl font-black text-white uppercase tracking-tighter leading-none">{selectedAnimal.commonName}</h2>
                                        <p className="text-[10px] italic text-stone-200 mt-2 font-medium tracking-wide uppercase">{selectedAnimal.scientificName}</p>
                                    </div>
                                </div>
                                <div className="p-8">
                                    <p className="text-sm text-stone-700 leading-relaxed italic text-justify font-medium">"{selectedAnimal.info}"</p>
                                    <button onClick={() => { addToMyList(selectedAnimal); setSelectedAnimal(null); }} className="w-full mt-8 py-5 bg-lime-800 text-white rounded-2xl font-black uppercase text-[10px] tracking-[0.2em] shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-transform"><Icon name="plus" className="w-5 h-5" /> Añadir a mi reporte</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="py-12 md:py-20 px-6 text-center text-lime-100 mt-auto bg-lime-800">
                        <div className="max-w-4xl mx-auto space-y-10">
                            <div className="space-y-5">
                                <div className="flex items-center justify-center gap-3 text-[14px] md:text-[22px] font-black uppercase text-white">
                                    <img src={faviconUrl} alt="Icon" className="h-5 md:h-8 w-auto" />
                                    <p>ECOHOTEL EL LIMONAR, SUCRE, COLOMBIA</p>
                                </div>
                                <p className="italic font-light text-[16px] md:text-[26px] font-serif text-lime-50/90 leading-none">"13 años cultivando hospitalidad consciente"</p>
                            </div>
                            <div className="flex flex-col items-center gap-3 pt-8 border-t border-white/10 opacity-60 text-[9px] md:text-[11px] uppercase tracking-widest">
                                <p>© 2026 TODOS LOS DERECHOS RESERVADOS</p>
                                <button onClick={() => setIsLegalOpen(true)} className="text-white underline underline-offset-8">Legales</button>
                            </div>
                        </div>
                    </footer>

                    {isLegalOpen && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/80 backdrop-blur-md p-4" onClick={() => setIsLegalOpen(false)}>
                            <div className="bg-stone-50 w-full max-w-2xl max-h-[90vh] rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl animate-fade-in" onClick={e => e.stopPropagation()}>
                                <div className="p-6 md:p-8 border-b border-stone-200 flex justify-between items-center bg-white shrink-0">
                                    <h2 className="text-xl font-black text-lime-950 uppercase tracking-tighter">Información Legal</h2>
                                    <button onClick={() => setIsLegalOpen(false)} className="bg-stone-100 p-2.5 rounded-full text-stone-500 hover:bg-stone-200 transition-colors"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-8 md:p-12 overflow-y-auto space-y-8 custom-scrollbar text-stone-600 text-[13px] leading-relaxed text-justify">
                                    <section className="space-y-3">
                                        <div className="flex items-center gap-2 text-lime-800">
                                            <Icon name="shield-check" className="w-5 h-5" />
                                            <h3 className="font-black uppercase tracking-widest text-[11px]">Propiedad Intelectual</h3>
                                        </div>
                                        <p>El diseño, interfaz y fotografías son propiedad exclusiva de <strong>Eco Hotel El Limonar</strong>. Queda prohibida la reproducción parcial o total, distribución o uso comercial sin autorización previa.</p>
                                    </section>

                                    <section className="space-y-4">
                                        <div className="flex items-center gap-2 text-lime-800">
                                            <Icon name="scale" className="w-5 h-5" />
                                            <h3 className="font-black uppercase tracking-widest text-[11px]">Responsabilidad y Uso Indebido</h3>
                                        </div>
                                        <p>Eco Hotel El Limonar no se hace responsable por el uso indebido de la información aquí contenida. Se considera <strong>uso indebido</strong> cualquier acción que desvíe el propósito educativo (como el uso comercial no autorizado de las fotos o la falsificación malintencionada de reportes).</p>
                                        <div className="bg-stone-100 p-6 rounded-2xl italic text-stone-500 border-l-4 border-lime-800">
                                            <p>Esta bitácora es una <strong>guía informativa</strong>. Al ser un entorno natural, la ubicación de las especies es dinámica. El hotel no asume responsabilidad por la seguridad del usuario si este ignora las normas de distancia y respeto hacia la fauna silvestre.</p>
                                        </div>
                                    </section>
                                </div>
                                <div className="p-6 md:p-8 bg-white border-t border-stone-100 shrink-0 text-center">
                                    <button onClick={() => setIsLegalOpen(false)} className="w-full py-5 bg-stone-900 text-white rounded-2xl font-black uppercase text-[11px] tracking-[0.25em] active:scale-95 transition-transform">Entiendo y Acepto</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
