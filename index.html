<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUÍA DE BIODIVERSIDAD - El Limonar</title>
    <!-- Librerías de React, Tailwind e Iconos -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --primary: #3f6212; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #fafaf9; overflow-x: hidden; margin: 0; padding: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .animal-card { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .animal-card:active { transform: scale(0.96); }
        
        .view-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .img-skeleton {
            background: linear-gradient(110deg, #f3f4f6 8%, #e5e7eb 18%, #f3f4f6 33%);
            background-size: 200% 100%;
            animation: shine 1.5s linear infinite;
        }
        @keyframes shine { to { background-position-x: -200%; } }
    </style>
</head>
<body class="text-stone-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const scriptURL = ""; 
        const mapUrl = "https://ecolimonar.github.io/mapa_sendero_limonar.html/"; 

        const Icon = ({ name, className = "w-4 h-4" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const ImageWithFallback = ({ src, alt, category, className }) => {
            const [error, setError] = useState(false);
            const [loading, setLoading] = useState(true);

            const getCategoryIcon = () => {
                switch(category) {
                    case 'Aves': return 'bird';
                    case 'Mariposas': return 'bug';
                    case 'Arácnidos': return 'clover';
                    case 'Reptiles': return 'target';
                    case 'Anfibios': return 'droplet';
                    case 'Primates':
                    case 'Mamíferos': return 'footprints';
                    default: return 'image';
                }
            };

            return (
                <div className={`relative overflow-hidden flex items-center justify-center ${className} ${loading ? 'img-skeleton' : ''}`}>
                    {!error && src ? (
                        <img 
                            src={src} 
                            alt={alt} 
                            referrerPolicy="no-referrer"
                            className={`w-full h-full object-cover transition-opacity duration-300 ${loading ? 'opacity-0' : 'opacity-100'}`}
                            onLoad={() => setLoading(false)}
                            onError={() => { setError(true); setLoading(false); }}
                        />
                    ) : (
                        <div className="flex flex-col items-center justify-center text-stone-300 gap-2">
                            <Icon name={getCategoryIcon()} className="w-8 h-8 opacity-20" />
                            <span className="text-[7px] font-bold uppercase tracking-widest opacity-40 italic text-center px-4 italic">El Limonar Vivo</span>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const getImg = useCallback((id) => {
                if(!id || id === "ID_PENDIENTE") return "";
                return id.startsWith('http') ? id : `https://lh3.googleusercontent.com/d/${id}=s1000`;
            }, []);

            const logoUrl = getImg("1dDQyRWcdpAyXI6MIW7ydC4a9G5vpwKxk");

            const [view, setView] = useState('explore'); 
            const [filter, setFilter] = useState('Todos');
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedAnimal, setSelectedAnimal] = useState(null);
            const [isReporting, setIsReporting] = useState(null);
            const [status, setStatus] = useState('idle');

            const [formData, setFormData] = useState({
                guestName: '', cabin: '', guestEmail: '', location: ''
            });

            // --- LISTA COMPLETA ORIGINAL DE 105 ANIMALES CON RELATOS DE IMPORTANCIA AMBIENTAL ---
            const animals = [
                // PRIMATES Y MAMÍFEROS
                { id: 44, commonName: "Loro Real (Rosita)", scientificName: "Amazona ochrocephala", category: "Aves", habitat: "Jardines", info: "Rosita es la anfitriona de El Limonar. Su especie ayuda a dispersar semillas de palmas nativas, regenerando la cobertura vegetal que nos da sombra.", color: "bg-emerald-500", image: "1DHzFmNrPyujZU3y6D2H8v1qSTJC8Z6dz" },
                { id: 2, commonName: "Mono Marteja", scientificName: "Aotus lemurinus", category: "Primates", habitat: "Noche", info: "Un centinela nocturno. Controla poblaciones de insectos y es un dispersor clave de semillas de árboles que solo fructifican en la noche.", color: "bg-amber-900", image: "1qoyIz0TLmrEo935n0VkqpLMpj2F-zcvs" },
                { id: 1, commonName: "Mono Aullador Rojo", scientificName: "Alouatta seniculus", category: "Primates", habitat: "Dosel", info: "Ingeniero del bosque. Sus hábitos de alimentación promueven el crecimiento de nuevas ramas y la entrada de luz solar a las zonas bajas del bosque.", color: "bg-orange-700", image: "1ZA0JsTaJUnbOplOdBqQKizEmGin1xMpH" },
                { id: 76, commonName: "Tití Cabeciblanco", scientificName: "Saguinus oedipus", category: "Primates", habitat: "Bosque Seco", info: "Joyas del Caribe. Protegemos su hábitat porque son los reforestadores más activos, dispersando semillas de árboles que otros animales no consumen.", color: "bg-slate-300", image: "1U73t7OpQozKkqkelvVrZRIvVMsTmOmKv" },
                { id: 86, commonName: "Oso Perezoso", scientificName: "Bradypus variegatus", category: "Mamíferos", habitat: "Dosel", info: "Un ecosistema andante. Su ritmo pausado permite la vida de micro-organismos en su pelaje, demostrando la paz y salud de nuestro entorno.", color: "bg-stone-700", image: "1_emC_qGq0hU6fq5dIGouTLS5hjcFM_Bt" },
                { id: 21, commonName: "Ardilla de Cola Roja", scientificName: "Sciurus granatensis", category: "Mamíferos", habitat: "Árboles", info: "Jardinera incansable. Al enterrar nueces y semillas que luego olvida, siembra involuntariamente cientos de árboles nativos cada año.", color: "bg-orange-900", image: "1cyQq43aizGJPcQ8s_KT6lP40nhbfGyPK" },
                { id: 20, commonName: "Oso Hormiguero", scientificName: "Tamandua tetradactyla", category: "Mamíferos", habitat: "Bosque", info: "Controlador de insectos xilófagos. Mantiene sanos los troncos de nuestros árboles centenarios al regular las poblaciones de termitas.", color: "bg-amber-800", image: "10ZDVYkH3mNZx_FIoCWTFEEH5YtiXWVFZ" },

                // AVES
                { id: 4, commonName: "Guacamaya Bandera", scientificName: "Ara macao", category: "Aves", habitat: "Selva", info: "Embajadora del color. Su presencia indica que nuestros bosques están bien conectados regionalmente, permitiendo el flujo de vida.", color: "bg-red-600", image: "18Am6EdZcpS7rluz1ce0mq1qupCCUxU9q" },
                { id: 3, commonName: "Tucán Pico Iris", scientificName: "Ramphastos sulfuratus", category: "Aves", habitat: "Bosque", info: "Arquitecto del dosel. Dispersa semillas grandes que forman la estructura principal de la selva tropical de El Limonar.", color: "bg-emerald-600", image: "1BmEOSSQ-GsXMAJYcZlmYZLmBA4cBp3uT" },
                { id: 5, commonName: "Loro Cabeciazul", scientificName: "Pionus menstruus", category: "Aves", habitat: "Selva", info: "Centinela social. Sus llamados alertan a otras especies sobre depredadores, manteniendo una red de seguridad compartida en el bosque.", color: "bg-blue-600", image: "1g9k43mkqOIk1p1ZTE1aRhJxOM4yLd6Cb" },
                { id: 6, commonName: "Guacamayo Severo", scientificName: "Ara severus", category: "Aves", habitat: "Dosel", info: "Símbolo de lealtad. Parejas que anidan juntas por años, indicando que el hotel ofrece un ambiente estable y seguro para la vida silvestre.", color: "bg-green-700", image: "1zVAV-JBPPlVGHBZSrPIfIUnrol3h0B5B" },
                { id: 7, commonName: "Bobo Punteado", scientificName: "Hypnelus ruficollis", category: "Aves", habitat: "Matorral", info: "Maestro del acecho. Controla insectos en zonas bajas, ayudando a mantener el equilibrio biológico cerca de nuestros senderos.", color: "bg-amber-600", image: "1YRYcPBOE7yqwBPphBq52HLebrBwHLF1n" },
                { id: 8, commonName: "Canario Criollo", scientificName: "Sicalis flaveola", category: "Aves", habitat: "Jardines", info: "La música de El Limonar. Su presencia masiva indica una abundancia saludable de semillas silvestres en nuestras áreas verdes.", color: "bg-yellow-400", image: "1Y8j_tWbvD3xTvsY3oyG8lHU0ruEJzgHj" },
                { id: 9, commonName: "Carpintero Pechipunteado", scientificName: "Colaptes punctigula", category: "Aves", habitat: "Troncos", info: "Sanador de cortezas. Elimina larvas que podrían enfermar a los árboles del bosque seco caribeño.", color: "bg-stone-700", image: "1Gh640OI7EJG2C6yMmP0c6pQfv3enDxJm" },
                { id: 10, commonName: "Mosquerito Silbón", scientificName: "Camptostoma obsoletum", category: "Aves", habitat: "Ramas", info: "Aliado aéreo. Captura miles de mosquitos al día, protegiendo a nuestros huéspedes de forma biológica y silenciosa.", color: "bg-stone-400", image: "1d6V2JswnW46pZAn5CBjrHlAa5rTvoOAZ" },
                { id: 11, commonName: "Garza Azul", scientificName: "Egretta caerulea", category: "Aves", habitat: "Humedales", info: "Elegancia en los canales. Mantiene el equilibrio de las poblaciones de pequeños peces y crustáceos en nuestros sistemas hídricos.", color: "bg-indigo-700", image: "1fVsgu05agLC6lqLNg65_5o9SgfuzKO1n" },

                { id: 13, commonName: "Gavilán Cienaguero", scientificName: "Busarellus nigricollis", category: "Aves", habitat: "Ciénaga", info: "Depredador de la salud hídrica. Regula la fauna acuática, asegurando que solo los individuos más aptos prosperen en la ciénaga.", color: "bg-yellow-700", image: "13PsJypK4SHk8gJC-5TxtfcuAmSTpOOim" },
                { id: 14, commonName: "Martín Pescador", scientificName: "Chloroceryle amazona", category: "Aves", habitat: "Ríos", info: "Guardia del agua. Su presencia es garantía de que el agua de El Limonar es pura y rica en oxígeno y vida.", color: "bg-teal-800", image: "1PvB52AudBPoCXpyDmIlJ3qZJfRdhOvwg" },
                { id: 15, commonName: "Gallito de Ciénaga", scientificName: "Jacana jacana", category: "Aves", habitat: "Lirios", info: "Caminante de ninfas. Sus patas largas ayudan a limpiar la superficie de las lagunas de materia orgánica en exceso.", color: "bg-indigo-600", image: "1SF3aa9jKRknXXVlgB620gAr3ghpFO41D" },
                { id: 16, commonName: "Garza Tigre", scientificName: "Tigrisoma lineatum", category: "Aves", habitat: "Humedales", info: "Maestra del camuflaje. Indica la salud de los bordes de los humedales, donde la vida se esconde y florece.", color: "bg-amber-700", image: "19oYVUkpV75cxjDEmEY743GgA-Vlhcm1X" },
                { id: 17, commonName: "Garcita Estriada", scientificName: "Butorides striata", category: "Aves", habitat: "Orilla", info: "Limpiadora de orillas. Controla los insectos que proliferan en las riberas, manteniendo el confort en nuestras zonas de descanso.", color: "bg-stone-500", image: "1UmR4z4LRZ5fP6xMp9A0G02JZGD_thhLs" },
                { id: 18, commonName: "Monjita Cabeciamarilla", scientificName: "Chrysomus icterocephalus", category: "Aves", habitat: "Juncos", info: "Vibrante habitante de los humedales. Poliniza plantas acuáticas esenciales para la filtración natural del agua.", color: "bg-yellow-600", image: "12zFl7hBOhOO4uAZSflgBzaQP6f5tRkv-" },
                { id: 19, commonName: "Hornero", scientificName: "Furnarius rufus", category: "Aves", habitat: "Caminos", info: "Arquitecto social. Sus nidos de barro son tan resistentes que brindan refugio térmico a otras especies durante años.", color: "bg-orange-300", image: "1HKGNhB055JBJ5H5n6nGHp88Yu_5Jzpee" },
                { id: 31, commonName: "Pato Pisingo", scientificName: "Dendrocygna autumnalis", category: "Aves", habitat: "Lagunas", info: "Fertilizador acuático. Sus grupos ayudan a distribuir nutrientes entre los espejos de agua de la reserva.", color: "bg-amber-700", image: "1pSLksDPkyEuB46vQEj0T2wxKArNJS8P2" },
                { id: 32, commonName: "Garceta Nívea", scientificName: "Egretta thula", category: "Aves", habitat: "Charcas", info: "Elegancia activa. Al remover el fondo con sus patas, oxigena el sustrato acuático y libera nutrientes atrapados.", color: "bg-sky-600", image: "1aP0ccBl6PbM30P7UlPs6M5jCYLd1s1zm" },
                { id: 33, commonName: "Caracara", scientificName: "Caracara cheriway", category: "Aves", habitat: "Suelo", info: "Saneador del bosque. Como ave oportunista, limpia la reserva de materia orgánica en descomposición, evitando enfermedades.", color: "bg-stone-800", image: "1Qs1ho5wK-W5o9kcqi0BsMVsS9kjRT3B1" },
                { id: 34, commonName: "Caracara Cabeciamarillo", scientificName: "Milvago chimachima", category: "Aves", habitat: "Áreas abiertas", info: "Médico de campo. Limpia garrapatas y parásitos de otros animales, un ejemplo asombroso de cooperación natural.", color: "bg-yellow-600", image: "1AiL-9QO3bBlkC1y3KgDEP6Nm6g-fpAa4" },
                { id: 35, commonName: "Turpial Amarillo", scientificName: "Icterus nigrogularis", category: "Aves", habitat: "Bordes", info: "El sol de los senderos. Además de su canto, es un controlador vital de orugas que podrían defoliar arbustos jóvenes.", color: "bg-yellow-500", image: "1g6Gkewa-yk2MOjhjrKkZ4Eopq-CsP9mA" },
                { id: 36, commonName: "Guacamaya Azul", scientificName: "Ara arauna", category: "Aves", habitat: "Palmas", info: "Majestuosidad en pareja. Su dependencia de las palmas reales subraya la importancia de conservar cada árbol de El Limonar.", color: "bg-blue-600", image: "1-ashIeBU5SSER_RJXRKZEylyBLXcvKH9" },
                { id: 37, commonName: "Alcaraván", scientificName: "Vanellus chilensis", category: "Aves", habitat: "Pasto", info: "Guardián territorial. Alerta a todo el hotel sobre la presencia de extraños, protegiendo indirectamente los nidos de otras especies.", color: "bg-stone-500", image: "1xKjKafyeHCIKvwiZ1oXazhCTLuIX2QsW" },
                { id: 38, commonName: "Tingua", scientificName: "Porphyrio martinica", category: "Aves", habitat: "Humedales", info: "Colores de la ciénaga. Es fundamental para controlar la sobrepoblación de plantas flotantes que podrían asfixiar las lagunas.", color: "bg-indigo-600", image: "1w2oTkRFTSYYAqGxAi8fEeslPjqPrxt6_" },
                { id: 39, commonName: "Catica", scientificName: "Brotogeris jugularis", category: "Aves", habitat: "Frutales", info: "Amiga del sembrador. Al alimentarse de frutas carnosas, dispersa semillas fértiles a lo largo de todo el predio.", color: "bg-lime-600", image: "1-ysbyOTWxr8LLJ8KfV02lK6mqajlSPhg" },

                { id: 41, commonName: "Carpintero Lineado", scientificName: "Dryocopus lineatus", category: "Aves", habitat: "Bosques", info: "Buscador de salud. Al taladrar madera muerta, ayuda al proceso de reciclaje de nutrientes de los troncos viejos.", color: "bg-red-700", image: "15BEYaC81JqihPvlseXI8HRb-FhoTbcf2" },
                { id: 42, commonName: "Pitirre", scientificName: "Tyrannus melancholicus", category: "Aves", habitat: "Postes", info: "Feroz guardián de los cielos. Su valentía ahuyenta a rapaces que podrían amenazar a los polluelos de aves cantoras.", color: "bg-yellow-600", image: "111PNAaNu8Q3CUdysVWwAysmxlcIYQO0Q" },
                { id: 43, commonName: "Pepitero Grisáceo", scientificName: "Saltator coerulescens", category: "Aves", habitat: "Bosque", info: "Gourmet de hojas. Su alimentación equilibrada ayuda a la poda natural de arbustos, permitiendo un crecimiento fuerte.", color: "bg-stone-400", image: "1OVfANId8-8BSkKGtoOEsvUR9UdoTJGmw" },

                { id: 48, commonName: "Paloma de Ojos Azules", scientificName: "Columbina sp.", category: "Aves", habitat: "Jardín", info: "Paz en los senderos. Consume semillas de plantas invasoras, ayudando a que el césped se mantenga nativo y sano.", color: "bg-stone-300", image: "1Roh_RatBR4krUbPB3eFNwI_10Ctw_PDw" },
                { id: 49, commonName: "Cucarachero Currucuchú", scientificName: "Campylorhynchus griseus", category: "Aves", habitat: "Matorrales", info: "Maestros del canto grupal. Su labor social ayuda a descubrir fuentes de alimento para muchas otras especies.", color: "bg-stone-600", image: "1j-2E0HJmyCNA-Iv9k1_1G6Bu2A3UMOJ6" },

                                    {filteredAnimals.map(animal => (
                                        <div key={animal.id} className="animal-card bg-white rounded-2xl overflow-hidden shadow-sm flex flex-col border border-stone-100 group">
                                            <div className="aspect-square relative overflow-hidden bg-stone-100">
                                                <ImageWithFallback src={getImg(animal.image)} alt={animal.commonName} category={animal.category} className="w-full h-full group-hover:scale-110 transition-transform duration-700" />
                                                <button onClick={() => setIsReporting(animal)} className="absolute top-2 right-2 bg-lime-800 text-white p-2.5 rounded-full shadow-lg active:scale-125 transition-transform z-10 backdrop-blur-sm">
                                                    <Icon name="camera" className="w-3.5 h-3.5" />
                                                </button>
                                            </div>
                                            <div className="p-4 flex-1 flex flex-col justify-between">
                                                <div>
                                                    <span className="text-[7px] font-black uppercase text-lime-800/60 tracking-widest">{animal.category}</span>
                                                    <h3 className="text-[10px] font-black text-stone-800 truncate leading-tight uppercase tracking-tighter mb-1 mt-0.5">{animal.commonName}</h3>
                                                </div>
                                                <button onClick={() => setSelectedAnimal(animal)} className="w-full mt-3 py-2 text-[8px] font-black uppercase tracking-widest bg-stone-50 text-stone-500 rounded-lg border border-stone-100 hover:bg-lime-800 hover:text-white transition-all">Ver Relato</button>
                                            </div>
                                        </div>
                                    ))}
                                </main>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col p-4 max-w-7xl mx-auto w-full">
                                <div className="bg-white p-2 rounded-[2rem] shadow-xl border border-stone-200 flex-1 overflow-hidden h-[600px]">
                                    <iframe src={mapUrl} className="w-full h-full border-none rounded-[1.5rem]" title="Mapa" loading="lazy" />
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Modales */}
                    {isReporting && (
                        <div className="fixed inset-0 z-[110] flex items-end md:items-center justify-center bg-black/70 backdrop-blur-sm px-4" onClick={() => setIsReporting(null)}>
                            <div className="bg-white w-full max-w-md rounded-t-[2.5rem] md:rounded-[2.5rem] p-8 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <h2 className="text-xl font-black text-lime-950 uppercase tracking-tighter mb-1">Registrar Avistamiento</h2>
                                <p className="text-[10px] font-bold uppercase text-lime-800 mb-6 tracking-widest">Colabora con el inventario de {isReporting.commonName}</p>
                                <form onSubmit={handleSubmit} className="space-y-3">
                                    <input required type="text" placeholder="Tu nombre" value={formData.guestName} onChange={e => setFormData({...formData, guestName: e.target.value})} className="w-full bg-stone-100 border-none rounded-xl py-4 px-4 text-xs outline-none focus:ring-1 focus:ring-lime-800" />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input required type="text" placeholder="Cabaña #" value={formData.cabin} onChange={e => setFormData({...formData, cabin: e.target.value})} className="w-full bg-stone-100 border-none rounded-xl py-4 px-4 text-xs outline-none" />
                                        <input required type="text" placeholder="Lugar exacto" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full bg-stone-100 border-none rounded-xl py-4 px-4 text-xs outline-none" />
                                    </div>
                                    <button disabled={status === 'sending'} type="submit" className="w-full py-4 rounded-xl bg-lime-800 text-white font-black uppercase tracking-widest mt-2 hover:bg-lime-900 shadow-xl shadow-lime-900/30 active:scale-95 transition-all">
                                        {status === 'sending' ? 'Enviando...' : (status === 'success' ? '¡Gracias por ayudar!' : 'Confirmar Avistamiento')}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {selectedAnimal && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center bg-black/90 backdrop-blur-md px-4" onClick={() => setSelectedAnimal(null)}>
                            <div className="bg-white w-full max-w-xl rounded-t-[2.5rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="h-80 relative bg-stone-200">
                                    <ImageWithFallback src={getImg(selectedAnimal.image)} alt={selectedAnimal.commonName} category={selectedAnimal.category} className="w-full h-full" />
                                    <button onClick={() => setSelectedAnimal(null)} className="absolute top-6 right-6 bg-black/40 p-3 rounded-full text-white backdrop-blur-md hover:bg-black/60 transition-colors"><Icon name="x" /></button>
                                    <div className="absolute bottom-0 left-0 w-full p-10 bg-gradient-to-t from-black via-black/40 to-transparent">
                                        <h2 className="text-3xl font-black text-white leading-none uppercase tracking-tighter">{selectedAnimal.commonName}</h2>
                                        <p className="text-xs italic text-stone-200 mt-2 font-medium tracking-wide">{selectedAnimal.scientificName}</p>
                                    </div>
                                </div>
                                <div className="p-10 bg-white">
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="flex flex-col">
                                            <span className="text-[8px] font-black uppercase text-stone-400 tracking-[0.2em] mb-1">Categoría</span>
                                            <span className="px-4 py-1.5 bg-lime-100 text-lime-900 rounded-full text-[9px] font-black uppercase tracking-widest border border-lime-200">{selectedAnimal.category}</span>
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-[8px] font-black uppercase text-stone-400 tracking-[0.2em] mb-1">Hábitat Principal</span>
                                            <span className="px-4 py-1.5 bg-stone-100 text-stone-800 rounded-full text-[9px] font-black uppercase tracking-widest border border-stone-200">{selectedAnimal.habitat}</span>
                                        </div>
                                    </div>
                                    <div className="relative">
                                        <Icon name="quote" className="absolute -top-6 -right-2 w-16 h-16 text-lime-50 opacity-40 -z-0" />
                                        <p className="relative z-10 text-[15px] text-stone-700 leading-relaxed italic text-justify font-medium">
                                            "{selectedAnimal.info}"
                                        </p>
                                    </div>
                                    <div className="mt-10 pt-8 border-t border-stone-100">
                                        <button onClick={() => { setSelectedAnimal(null); setIsReporting(selectedAnimal); }} className="w-full py-5 bg-lime-800 text-white rounded-2xl font-black uppercase tracking-[0.2em] shadow-2xl shadow-lime-900/30 active:scale-95 transition-all flex items-center justify-center gap-3">
                                            <Icon name="camera" className="w-5 h-5" />
                                            ¡Lo estoy observando ahora!
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="py-20 text-center text-stone-400 text-[9px] font-black uppercase tracking-[0.5em] mt-auto">
                        &copy; 2026 Ecohotel El Limonar &bull; Reserva Natural Protegida
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
